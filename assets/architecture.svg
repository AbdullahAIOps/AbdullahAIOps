  <path d="M800 240 L790 190" stroke="#D9E8F6" stroke-opacity=".35" stroke-width="1.2" stroke-dasharray="2 4"/>

  <g font-family="Courier New, monospace" font-size="9" fill="#7FA3C4">
    <line x1="24" y1="306" x2="48" y2="306" stroke="#D9E8F6" stroke-width="1.6"/><text x="54" y="309">traffic</text>
    <line x1="120" y1="306" x2="144" y2="306" stroke="#F0692B" stroke-width="1.6" stroke-dasharray="6 6"/><text x="150" y="309">gitops sync</text>
    <line x1="240" y1="306" x2="264" y2="306" stroke="#7FA3C4" stroke-width="1.4" stroke-dasharray="3 5"/><text x="270" y="309">provision</text>
    <line x1="352" y1="306" x2="376" y2="306" stroke="#D9E8F6" stroke-opacity=".35" stroke-width="1.2" stroke-dasharray="2 4"/><text x="382" y="309">telemetry</text>

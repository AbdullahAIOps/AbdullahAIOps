  <text x="876" y="32" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#7FA3C4">REV 2026.07 · SCALE 1:1</text>

  <rect x="24" y="86" width="96" height="52" rx="8" fill="#13273D" stroke="#D9E8F6" stroke-width="1.6"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="Reference architecture: users to ingress to Kubernetes cluster to data, provisioned by Terraform, synced by Argo CD, watched by Prometheus.">
  <defs>
    <pattern id="agrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#132437" stroke-opacity=".06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="320" fill="#F2F5F8"/>
  <rect width="900" height="320" fill="url(#agrid)"/>
  <rect x="1" y="1" width="898" height="318" fill="none" stroke="#132437" stroke-width="2"/>

  <text x="24" y="32" font-family="Courier New, monospace" font-size="12" fill="#B23F06" letter-spacing="2">FIG. A — REFERENCE ARCHITECTURE</text>
  <text x="876" y="32" text-anchor="end" font-family="Courier New, monospace" font-size="11" fill="#6C86A0">REV 2026.07 · SCALE 1:1</text>

  <!-- traffic row -->
  <rect x="24" y="86" width="96" height="52" rx="8" fill="#FFFFFF" stroke="#132437" stroke-width="1.6"/>
  <text x="72" y="116" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#132437">USERS</text>

  <path d="M120 112 H166" stroke="#132437" stroke-width="1.8"/>
  <path d="M161 107 L170 112 L161 117" stroke="#132437" stroke-width="1.8" fill="none"/>

  <rect x="170" y="86" width="110" height="52" rx="8" fill="#FFFFFF" stroke="#132437" stroke-width="1.6"/>
  <text x="225" y="110" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#132437">INGRESS</text>
  <text x="225" y="126" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#6C86A0">tls · rate-limit</text>

  <path d="M280 112 H326" stroke="#132437" stroke-width="1.8"/>
  <path d="M321 107 L330 112 L321 117" stroke="#132437" stroke-width="1.8" fill="none"/>

  <!-- moving request dot -->
  <circle r="4" fill="#E4570F">
    <animateMotion path="M28 112 H330" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- cluster -->
  <rect x="330" y="60" width="304" height="150" rx="12" fill="none" stroke="#132437" stroke-width="1.8"/>
  <text x="346" y="84" font-family="Courier New, monospace" font-size="11" fill="#3D5468">KUBERNETES — EKS</text>
  <circle cx="612" cy="80" r="4" fill="#16A06B">
    <animate attributeName="opacity" values="1;.25;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <rect x="350" y="120" width="76" height="46" rx="7" fill="#FFFFFF" stroke="#132437" stroke-width="1.5"/>
  <text x="388" y="147" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#132437">svc-a</text>
  <rect x="444" y="120" width="76" height="46" rx="7" fill="#FFFFFF" stroke="#E4570F" stroke-width="1.8"/>
  <text x="482" y="141" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#E4570F">svc-b</text>
  <text x="482" y="156" text-anchor="middle" font-family="Courier New, monospace" font-size="8" fill="#B23F06">canary
    <animate attributeName="opacity" values="1;.3;1" dur="1.8s" repeatCount="indefinite"/>
  </text>
  <rect x="538" y="120" width="76" height="46" rx="7" fill="#FFFFFF" stroke="#132437" stroke-width="1.5"/>
  <text x="576" y="147" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#132437">svc-c</text>
  <text x="482" y="196" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#6C86A0">rolling releases · auto-rollback</text>

  <path d="M634 135 H676" stroke="#132437" stroke-width="1.8"/>
  <path d="M671 130 L680 135 L671 140" stroke="#132437" stroke-width="1.8" fill="none"/>

  <!-- data -->
  <rect x="680" y="92" width="192" height="96" rx="12" fill="none" stroke="#132437" stroke-width="1.8"/>
  <text x="696" y="114" font-family="Courier New, monospace" font-size="11" fill="#3D5468">DATA</text>
  <rect x="700" y="126" width="66" height="42" rx="7" fill="#132437"/>
  <text x="733" y="151" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#F2F5F8">RDS</text>
  <rect x="786" y="126" width="66" height="42" rx="7" fill="#FFFFFF" stroke="#132437" stroke-width="1.5"/>
  <text x="819" y="151" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#132437">S3</text>

  <!-- gitops row -->
  <rect x="24" y="240" width="104" height="50" rx="8" fill="#FFFFFF" stroke="#132437" stroke-width="1.6"/>
  <text x="76" y="262" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#132437">GIT REPO</text>
  <text x="76" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#6C86A0">source of truth</text>

  <path d="M128 258 C 240 258, 300 230, 380 212" stroke="#E4570F" stroke-width="1.8" fill="none" stroke-dasharray="6 6">
    <animate attributeName="stroke-dashoffset" from="0" to="-24" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <path d="M374 208 L384 210 L378 218" stroke="#E4570F" stroke-width="1.8" fill="none"/>
  <text x="240" y="238" font-family="Courier New, monospace" font-size="10" fill="#B23F06">argo cd — sync ⟳</text>

  <rect x="170" y="240" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#132437" stroke-width="1.6"/>
  <text x="230" y="262" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#132437">TERRAFORM</text>
  <text x="230" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#6C86A0">plan → apply</text>

  <path d="M290 258 C 420 262, 560 240, 700 194" stroke="#6C86A0" stroke-width="1.5" fill="none" stroke-dasharray="3 5">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="2.4s" repeatCount="indefinite"/>
  </path>
  <text x="470" y="272" font-family="Courier New, monospace" font-size="10" fill="#6C86A0">provisions ↑</text>

  <!-- observability -->
  <rect x="620" y="240" width="252" height="50" rx="8" fill="#FFFFFF" stroke="#132437" stroke-width="1.6"/>
  <text x="746" y="262" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#132437">PROMETHEUS · GRAFANA · LOKI</text>
  <text x="746" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#16A06B">SLOs · error budgets · 0 pages today</text>
  <path d="M700 240 L560 212" stroke="#132437" stroke-opacity=".4" stroke-width="1.2" stroke-dasharray="2 4"/>
  <path d="M800 240 L790 190" stroke="#132437" stroke-opacity=".4" stroke-width="1.2" stroke-dasharray="2 4"/>

  <!-- legend -->
  <g font-family="Courier New, monospace" font-size="9" fill="#6C86A0">
    <line x1="24" y1="306" x2="48" y2="306" stroke="#132437" stroke-width="1.6"/><text x="54" y="309">traffic</text>
    <line x1="120" y1="306" x2="144" y2="306" stroke="#E4570F" stroke-width="1.6" stroke-dasharray="6 6"/><text x="150" y="309">gitops sync</text>
    <line x1="240" y1="306" x2="264" y2="306" stroke="#6C86A0" stroke-width="1.4" stroke-dasharray="3 5"/><text x="270" y="309">provision</text>
    <line x1="352" y1="306" x2="376" y2="306" stroke="#132437" stroke-opacity=".4" stroke-width="1.2" stroke-dasharray="2 4"/><text x="382" y="309">telemetry</text>
  </g>
</svg>

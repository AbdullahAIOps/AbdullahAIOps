  <text x="230" y="278" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#7FA3C4">plan → apply</text>

  <path d="M290 258 C 420 262, 560 240, 700 194" stroke="#7FA3C4" stroke-width="1.5" fill="none" stroke-dasharray="3 5">

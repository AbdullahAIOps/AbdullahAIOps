<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200" role="img" aria-label="CI/CD pipeline">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b30"/>
      <stop offset="1" stop-color="#15273f"/>
    </linearGradient>
    <filter id="pglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>text{font-family:'JetBrains Mono',ui-monospace,monospace;}</style>
  </defs>

  <rect x="4" y="4" width="992" height="192" rx="16" fill="url(#pbg)" stroke="#C9A84C" stroke-opacity="0.22" stroke-width="1.5"/>
  <text x="30" y="36" font-size="13" letter-spacing="3" fill="#C9A84C">CI / CD  PIPELINE</text>
  <circle cx="966" cy="31" r="4.5" fill="#5fd0a8" filter="url(#pglow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- connectors with flowing dashes -->
  <g stroke="#3D6494" stroke-width="2" fill="none" stroke-dasharray="6 8">
    <line x1="142" y1="120" x2="202" y2="120"><animate attributeName="stroke-dashoffset" values="28;0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="306" y1="120" x2="366" y2="120"><animate attributeName="stroke-dashoffset" values="28;0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="470" y1="120" x2="530" y2="120"><animate attributeName="stroke-dashoffset" values="28;0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="634" y1="120" x2="694" y2="120"><animate attributeName="stroke-dashoffset" values="28;0" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="798" y1="120" x2="858" y2="120"><animate attributeName="stroke-dashoffset" values="28;0" dur="1.2s" repeatCount="indefinite"/></line>
  </g>

  <!-- stage nodes -->
  <g>
    <!-- node template repeated: x centers 90,254,418,582,746,910 -->
    <g>
      <rect x="38" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="90" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Code</text>
      <circle cx="90" cy="82" r="4" fill="#C9A84C"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="0s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <rect x="202" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="254" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Build</text>
      <circle cx="254" cy="82" r="4" fill="#C9A84C"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <rect x="366" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="418" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Test</text>
      <circle cx="418" cy="82" r="4" fill="#C9A84C"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <rect x="530" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="582" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Scan</text>
      <circle cx="582" cy="82" r="4" fill="#C9A84C"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <rect x="694" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="746" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Deploy</text>
      <circle cx="746" cy="82" r="4" fill="#C9A84C"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="4s" repeatCount="indefinite"/></circle>
    </g>
    <g>
      <rect x="858" y="95" width="104" height="50" rx="10" fill="#16273f" stroke="#A8C4E0" stroke-opacity="0.28" stroke-width="1.4"/>
      <text x="910" y="124" text-anchor="middle" font-size="13" fill="#EAF2FB">Monitor</text>
      <circle cx="910" cy="82" r="4" fill="#5fd0a8"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="5s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- flowing token -->
  <circle r="6" fill="#C9A84C" filter="url(#pglow)">
    <animateMotion path="M90 120 H910" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>

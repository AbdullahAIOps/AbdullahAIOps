<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 160" width="1000" height="160" role="img" aria-label="Let's build something reliable together">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1424"/>
      <stop offset="1" stop-color="#14253f"/>
    </linearGradient>
    <linearGradient id="fsheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A8C4E0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A8C4E0" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#A8C4E0" stop-opacity="0"/>
    </linearGradient>
    <filter id="fg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>.s{font-family:Georgia,'Times New Roman',serif;} .m{font-family:'JetBrains Mono',ui-monospace,monospace;}</style>
  </defs>

  <rect x="4" y="4" width="992" height="152" rx="16" fill="url(#fbg)" stroke="#C9A84C" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- top dotted pulse line -->
  <g fill="#A8C4E0">
    <circle cx="120" cy="30" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="30" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="30" r="2.5" fill="#C9A84C"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="30" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="30" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="2s" repeatCount="indefinite"/></circle>
  </g>

  <text class="s" text-anchor="middle" x="500" y="82" font-size="27" font-weight="600" fill="#EAF2FB">Let&#8217;s build something reliable together.</text>

  <rect x="430" y="94" height="3" rx="1.5" fill="#C9A84C">
    <animate attributeName="width" values="0;140;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="500;430;500" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text class="m" text-anchor="middle" x="500" y="124" font-size="12.5" letter-spacing="1" fill="#A8C4E0" fill-opacity="0.85">DevOps Engineer  ·  AIOps Specialist  ·  Cloud  ·  Kubernetes  ·  Terraform</text>

  <rect x="-260" y="0" width="260" height="160" fill="url(#fsheen)" opacity="0.05">
    <animateTransform attributeName="transform" type="translate" from="-260 0" to="1260 0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 50" width="760" height="50" role="img" aria-label="What I do">
  <style>text{font-family:'JetBrains Mono',ui-monospace,monospace;}</style>
  <!-- blinking cursor -->
  <rect x="378" y="16" width="12" height="22" fill="#C9A84C" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <text text-anchor="middle" x="380" y="33" font-size="22" fill="#C9A84C">
    <tspan>Building reliable cloud infrastructure</tspan>
    <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.30;0.34;0.66;0.70;0.99;1" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 0;0 6;0 6;0 6;0 6;0 0" keyTimes="0;0.30;0.34;0.66;0.70;0.99;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <text text-anchor="middle" x="380" y="33" font-size="22" fill="#C9A84C" opacity="0">
    <tspan>Automating CI/CD pipelines end to end</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.31;0.35;0.63;0.67;1" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0;0 0;0 6;0 6" keyTimes="0;0.31;0.35;0.63;0.67;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <text text-anchor="middle" x="380" y="33" font-size="22" fill="#C9A84C" opacity="0">
    <tspan>Shipping with Docker and Kubernetes</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.64;0.68;0.97;1" dur="9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0;0 0;0 6" keyTimes="0;0.64;0.68;0.97;1" dur="9s" repeatCount="indefinite"/>
  </text>
</svg>

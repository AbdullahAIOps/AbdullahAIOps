<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 54" width="760" height="54" role="img" aria-label="Building reliable cloud infrastructure; automating CI/CD pipelines; shipping with Docker and Kubernetes">
  <defs>
    <style>
      .mono{font-family:'JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    </style>
  </defs>

  <!-- prompt caret -->
  <text x="150" y="35" class="mono" font-size="21" font-weight="700" fill="#C9A84C">&#10095;</text>

  <!-- phrase A -->
  <text x="178" y="35" class="mono" font-size="21" fill="#DCEAF8" opacity="1">Building reliable cloud infrastructure<tspan fill="#C9A84C">&#9612;<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1.06s" calcMode="discrete" repeatCount="indefinite"/></tspan>
    <animate attributeName="opacity" values="1;1;1;0;0;1" keyTimes="0;0.033;0.30;0.333;0.967;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <!-- phrase B -->
  <text x="178" y="35" class="mono" font-size="21" fill="#DCEAF8" opacity="0">Automating CI/CD pipelines end to end<tspan fill="#C9A84C">&#9612;<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1.06s" calcMode="discrete" repeatCount="indefinite"/></tspan>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.333;0.633;0.667;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <!-- phrase C -->
  <text x="178" y="35" class="mono" font-size="21" fill="#DCEAF8" opacity="0">Shipping with Docker and Kubernetes<tspan fill="#C9A84C">&#9612;<animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1.06s" calcMode="discrete" repeatCount="indefinite"/></tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.633;0.667;0.967;1" dur="9s" repeatCount="indefinite"/>
  </text>
</svg>

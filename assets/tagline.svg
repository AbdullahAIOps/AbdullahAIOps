<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 64" width="900" height="64" role="img" aria-label="Build it as code. Ship it with GitOps. Run it with SLOs.">
  <rect width="900" height="64" fill="#F2F5F8"/>
  <line x1="24" y1="33" x2="158" y2="33" stroke="#132437" stroke-opacity=".35" stroke-width="1.3" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="2.4s" repeatCount="indefinite"/>
  </line>
  <line x1="742" y1="33" x2="876" y2="33" stroke="#132437" stroke-opacity=".35" stroke-width="1.3" stroke-dasharray="7 7">
    <animate attributeName="stroke-dashoffset" from="0" to="28" dur="2.4s" repeatCount="indefinite"/>
  </line>

  <text x="180" y="39" font-family="Courier New, monospace" font-size="15" font-weight="bold" fill="#132437" letter-spacing="1" opacity="0">BUILD IT AS CODE
    <animate attributeName="opacity" from="0" to="1" dur=".5s" begin="0.1s" fill="freeze"/>
  </text>
  <path d="M350 26 L357 33 L350 40 L343 33 Z" fill="none" stroke="#E4570F" stroke-width="1.8" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".4s" begin="0.5s" fill="freeze"/>
  </path>
  <text x="372" y="39" font-family="Courier New, monospace" font-size="15" font-weight="bold" fill="#132437" letter-spacing="1" opacity="0">SHIP IT WITH GITOPS
    <animate attributeName="opacity" from="0" to="1" dur=".5s" begin="0.7s" fill="freeze"/>
  </text>
  <path d="M568 26 L575 33 L568 40 L561 33 Z" fill="none" stroke="#E4570F" stroke-width="1.8" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur=".4s" begin="1.1s" fill="freeze"/>
  </path>
  <text x="590" y="39" font-family="Courier New, monospace" font-size="15" font-weight="bold" fill="#132437" letter-spacing="1" opacity="0">RUN IT WITH SLOs
    <animate attributeName="opacity" from="0" to="1" dur=".5s" begin="1.3s" fill="freeze"/>
  </text>
</svg>

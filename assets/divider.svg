<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 20" width="900" height="20" role="img" aria-label="divider">
  <defs>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A8C4E0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#A8C4E0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A8C4E0" stop-opacity="0"/>
    </linearGradient>
    <filter id="dg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="10" x2="900" y2="10" stroke="url(#dl)" stroke-width="1.5"/>
  <circle cy="10" r="4" fill="#C9A84C" filter="url(#dg)">
    <animate attributeName="cx" values="60;840;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>

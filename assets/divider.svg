<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 40" width="1000" height="40" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="dLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#3D6494" stop-opacity="0.55"/>
      <stop offset="0.5"  stop-color="#C9A84C" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#3D6494" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dDiaT" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#FBEFC4"/>
      <stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="dDiaB" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#A8893C"/>
      <stop offset="1" stop-color="#6E5526"/>
    </linearGradient>
    <radialGradient id="dGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E7CE7E" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#E7CE7E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dPulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF8E6"/>
      <stop offset="0.4" stop-color="#E7CE7E"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- baseline -->
  <line x1="40" y1="20" x2="960" y2="20" stroke="url(#dLine)" stroke-width="1.6"/>

  <!-- flanking accent nodes -->
  <circle cx="300" cy="20" r="2.2" fill="#3D6494"/>
  <circle cx="700" cy="20" r="2.2" fill="#3D6494"/>
  <circle cx="190" cy="20" r="1.6" fill="#26486F"/>
  <circle cx="810" cy="20" r="1.6" fill="#26486F"/>

  <!-- traveling pulse -->
  <circle cx="0" cy="20" r="5" fill="url(#dPulse)">
    <animate attributeName="cx" values="60;940;60" dur="7s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite" keyTimes="0;0.1;0.9;1"/>
  </circle>

  <!-- center faceted gold node -->
  <g transform="translate(500,20)">
    <circle r="16" fill="url(#dGlow)">
      <animate attributeName="r" values="14;18;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- cut gem: four facets meeting at center -->
    <polygon points="0,-10 10,0 0,0" fill="url(#dDiaT)"/>
    <polygon points="0,-10 -10,0 0,0" fill="#F2DE9A"/>
    <polygon points="0,10 10,0 0,0" fill="url(#dDiaB)"/>
    <polygon points="0,10 -10,0 0,0" fill="#5E4D22"/>
    <polygon points="0,-10 10,0 0,10 -10,0" fill="none" stroke="#FFF8E6" stroke-opacity="0.5" stroke-width="0.7"/>
  </g>
</svg>
